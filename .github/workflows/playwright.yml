name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      STANDARD_USER: ${{ secrets.STANDARD_USER }}
      LOCKED_USER: ${{ secrets.LOCKED_USER }}
      PASSWORD: ${{ secrets.PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # ── Normal test suite (must pass) ───────────────────────────────────────
      - name: Run test suite
        id: normal-tests
        run: npm test -- --project=chromium

      - name: Upload normal test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-normal
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      # ── Demo failure tests (allowed to fail) ────────────────────────────────
      - name: Run demo failure tests
        id: demo-tests
        continue-on-error: true
        run: npm run test:demo-fail -- --project=chromium

      - name: Upload demo failure artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-demo-failures
          path: |
            playwright-report/
            test-results/
          retention-days: 14

      # ── Email report ─────────────────────────────────────────────────────────
      - name: Send email report
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_FROM }}
          subject: >
            [${{ steps.normal-tests.outcome == 'success' && 'PASSED' || 'FAILED' }}]
            Playwright Report — Run #${{ github.run_number }}
            (${{ github.ref_name }})
          html_body: |
            <html>
            <body style="font-family: Arial, sans-serif; color: #333;">
              <h2>Playwright Test Report — Run #${{ github.run_number }}</h2>

              <table style="border-collapse:collapse; width:100%; max-width:600px;">
                <tr>
                  <td style="padding:8px; font-weight:bold;">Repository</td>
                  <td style="padding:8px;">${{ github.repository }}</td>
                </tr>
                <tr style="background:#f5f5f5;">
                  <td style="padding:8px; font-weight:bold;">Branch</td>
                  <td style="padding:8px;">${{ github.ref_name }}</td>
                </tr>
                <tr>
                  <td style="padding:8px; font-weight:bold;">Commit</td>
                  <td style="padding:8px;">${{ github.sha }}</td>
                </tr>
                <tr style="background:#f5f5f5;">
                  <td style="padding:8px; font-weight:bold;">Triggered by</td>
                  <td style="padding:8px;">${{ github.actor }}</td>
                </tr>
                <tr>
                  <td style="padding:8px; font-weight:bold;">Normal suite</td>
                  <td style="padding:8px; color:${{ steps.normal-tests.outcome == 'success' && 'green' || 'red' }};">
                    <strong>${{ steps.normal-tests.outcome }}</strong>
                  </td>
                </tr>
                <tr style="background:#f5f5f5;">
                  <td style="padding:8px; font-weight:bold;">Demo failures</td>
                  <td style="padding:8px; color:orange;">
                    <strong>failed (expected — demo only)</strong>
                  </td>
                </tr>
              </table>

              <br>
              <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                 style="background:#0078d4; color:#fff; padding:10px 18px; text-decoration:none; border-radius:4px; display:inline-block;">
                View Full Run on GitHub Actions
              </a>

              <h3>Artifacts</h3>
              <p>The following artifacts are available on the Actions run page:</p>
              <ul>
                <li><strong>playwright-report-normal</strong> — HTML report for the main test suite</li>
                <li>
                  <strong>playwright-report-demo-failures</strong> — HTML report + failure screenshots,
                  videos, and traces for the demo failing tests
                </li>
              </ul>
              <p style="color:#888; font-size:12px;">
                Screenshots, videos, and traces are stored under <code>test-results/</code> inside
                the artifact zip. Open <code>playwright-report/index.html</code> locally for the
                full interactive report.
              </p>

              <hr style="border:none; border-top:1px solid #eee; margin:24px 0;">
              <p style="color:#aaa; font-size:11px;">
                Sent by GitHub Actions · ${{ github.repository }} · Run #${{ github.run_number }}
              </p>
            </body>
            </html>
