name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      BASE_URL: ${{ secrets.BASE_URL }}
      STANDARD_USER: ${{ secrets.STANDARD_USER }}
      LOCKED_USER: ${{ secrets.LOCKED_USER }}
      PASSWORD: ${{ secrets.PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # ── Normal test suite (must pass) ───────────────────────────────────────
      - name: Run test suite
        id: normal-tests
        run: npm test -- --project=chromium

      - name: Upload normal test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-normal
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      # ── Demo failure tests (allowed to fail) ────────────────────────────────
      - name: Run demo failure tests
        id: demo-tests
        continue-on-error: true
        run: npm run test:demo-fail -- --project=chromium

      - name: Upload demo failure artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-demo-failures
          path: |
            playwright-report/
            test-results/
          retention-days: 14

      # ── Email report ─────────────────────────────────────────────────────────
      - name: Get run date
        if: always()
        id: date
        run: echo "value=$(date +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_OUTPUT

      - name: Send email report
        if: always()
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          # port 465 = direct SSL (secure: true)
          # port 587 = STARTTLS (secure: false, nodemailer negotiates automatically)
          secure: ${{ secrets.MAIL_PORT == '465' }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_FROM }}
          subject: "Playwright Test Report - Nightly Run"
          attachments: playwright-report/index.html
          html_body: |
            <html>
            <body style="font-family: Arial, sans-serif; color: #333; max-width: 600px; margin: 0 auto;">

              <h2 style="border-bottom: 2px solid #0078d4; padding-bottom: 8px;">
                Playwright Test Report — Nightly Run
              </h2>

              <table style="border-collapse: collapse; width: 100%;">
                <tr>
                  <td style="padding: 10px 8px; font-weight: bold; width: 160px;">Status</td>
                  <td style="padding: 10px 8px;">
                    <span style="
                      background: ${{ steps.normal-tests.outcome == 'success' && '#d4edda' || '#f8d7da' }};
                      color:      ${{ steps.normal-tests.outcome == 'success' && '#155724' || '#721c24' }};
                      padding: 4px 12px; border-radius: 4px; font-weight: bold; font-size: 14px;">
                      ${{ steps.normal-tests.outcome == 'success' && 'PASS' || 'FAIL' }}
                    </span>
                  </td>
                </tr>
                <tr style="background: #f5f5f5;">
                  <td style="padding: 10px 8px; font-weight: bold;">Date</td>
                  <td style="padding: 10px 8px;">${{ steps.date.outputs.value }}</td>
                </tr>
                <tr>
                  <td style="padding: 10px 8px; font-weight: bold;">Repository</td>
                  <td style="padding: 10px 8px;">${{ github.repository }}</td>
                </tr>
                <tr style="background: #f5f5f5;">
                  <td style="padding: 10px 8px; font-weight: bold;">Branch</td>
                  <td style="padding: 10px 8px;">${{ github.ref_name }}</td>
                </tr>
                <tr>
                  <td style="padding: 10px 8px; font-weight: bold;">Triggered by</td>
                  <td style="padding: 10px 8px;">${{ github.actor }}</td>
                </tr>
              </table>

              <br>
              <p style="color: #555;">
                See attached <strong>index.html</strong> report and the artifacts below for full
                details including screenshots, videos, and traces.
              </p>

              <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                 style="display: inline-block; margin-top: 8px; background: #0078d4; color: #fff;
                        padding: 10px 20px; text-decoration: none; border-radius: 4px; font-weight: bold;">
                View Run on GitHub Actions →
              </a>

              <h3 style="margin-top: 28px;">Artifacts (download from Actions run page)</h3>
              <ul style="color: #555;">
                <li><strong>playwright-report-normal</strong> — full HTML report, normal suite</li>
                <li><strong>playwright-report-demo-failures</strong> — HTML report + screenshots / videos / traces</li>
              </ul>

              <hr style="border: none; border-top: 1px solid #eee; margin: 24px 0;">
              <p style="color: #aaa; font-size: 11px;">
                Sent by GitHub Actions · ${{ github.repository }} · Run #${{ github.run_number }}
              </p>

            </body>
            </html>
